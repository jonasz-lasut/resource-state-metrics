# PromQL tests for examples/metrics/eks/all-conditions-starlark.yaml
# Run with: promtool test rules promql-tests/eks/all-conditions-starlark_test.yaml
#
# Metric: eks_condition_status (gauge) - 1=True, 0=False, -1=Unknown per condition type
# Generated from: promql-tests/fixtures/metrics.prom

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'kube_customresource_eks_condition_status{condition_type="Synced",region="us-west-2",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition_status{condition_type="Ready",region="us-west-2",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "0"
      - series: 'kube_customresource_eks_condition_status{condition_type="Responsive",region="us-west-2",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition_status{condition_type="Synced",region="eu-west-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition_status{condition_type="Ready",region="eu-west-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "0"
      - series: 'kube_customresource_eks_condition_status{condition_type="Responsive",region="eu-west-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition_status{condition_type="Synced",region="us-east-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "1"
      - series: 'kube_customresource_eks_condition_status{condition_type="Ready",region="us-east-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "0"
      - series: 'kube_customresource_eks_condition_status{condition_type="Responsive",region="us-east-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "1"

    promql_expr_test:
      # Not-synced XRs (all synced, so empty)
      - expr: kube_customresource_eks_condition_status{condition_type="Synced"} == 0
        eval_time: 0m
        exp_samples: []

      # Not-ready XRs (all 3 not ready)
      - expr: kube_customresource_eks_condition_status{condition_type="Ready"} == 0
        eval_time: 0m
        exp_samples:
          - labels: 'kube_customresource_eks_condition_status{condition_type="Ready",region="us-west-2",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
            value: 0
          - labels: 'kube_customresource_eks_condition_status{condition_type="Ready",region="eu-west-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
            value: 0
          - labels: 'kube_customresource_eks_condition_status{condition_type="Ready",region="us-east-1",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
            value: 0

      # Unknown conditions (none, so empty)
      - expr: kube_customresource_eks_condition_status == -1
        eval_time: 0m
        exp_samples: []

      # Count of True conditions by type (Synced=3, Responsive=3)
      - expr: sum by (condition_type) (kube_customresource_eks_condition_status == 1)
        eval_time: 0m
        exp_samples:
          - labels: '{condition_type="Synced"}'
            value: 3
          - labels: '{condition_type="Responsive"}'
            value: 3
