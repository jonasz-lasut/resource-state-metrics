# PromQL tests for examples/metrics/eks/conditions-cel-map.yaml
# Run with: promtool test rules promql-tests/eks/conditions-cel-map_test.yaml
#
# Metric: eks_condition (gauge) - 1=True, 0=False per condition type
# Generated from: promql-tests/fixtures/metrics.prom

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'kube_customresource_eks_condition{condition_type="Ready",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "0"
      - series: 'kube_customresource_eks_condition{condition_type="Synced",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition{condition_type="Ready",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "1"
      - series: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "0"
      - series: 'kube_customresource_eks_condition{condition_type="Synced",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
        values: "1"
      - series: 'kube_customresource_eks_condition{condition_type="Ready",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "1"
      - series: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "0"
      - series: 'kube_customresource_eks_condition{condition_type="Synced",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
        values: "1"

    promql_expr_test:
      # Not-ready XRs (all Ready=1, so == 0 returns empty)
      - expr: kube_customresource_eks_condition{condition_type="Ready"} == 0
        eval_time: 0m
        exp_samples: []

      # Not-synced XRs (all Synced=1, so == 0 returns empty)
      - expr: kube_customresource_eks_condition{condition_type="Synced"} == 0
        eval_time: 0m
        exp_samples: []

      # All failing conditions (Responsive=0 for all 3 clusters)
      - expr: kube_customresource_eks_condition == 0
        eval_time: 0m
        exp_samples:
          - labels: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="staging-eks",namespace="team-a"}'
            value: 0
          - labels: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="dev-eks",namespace="team-b"}'
            value: 0
          - labels: 'kube_customresource_eks_condition{condition_type="Responsive",group="aws.platform.upbound.io",version="v1alpha1",kind="EKS",name="production-eks",namespace="team-a"}'
            value: 0
