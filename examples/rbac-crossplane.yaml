# Grant the Crossplane service account permissions to manage
# all resources created by the RSM composition functions.
# Apply this BEFORE installing the Configuration and XR.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-rsm-resources
  labels:
    app.kubernetes.io/name: resource-state-metrics
    app.kubernetes.io/managed-by: crossplane
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - serviceaccounts
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - bind
      - escalate
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-rsm-resources
  labels:
    app.kubernetes.io/name: resource-state-metrics
    app.kubernetes.io/managed-by: crossplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-rsm-resources
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system
