# Example: Provider Health Status
# Use Case: Alert when Crossplane providers are unhealthy
# Resolver: CEL (Common Expression Language)
#
# Metrics Generated:
# - kube_customresource_provider_healthy (gauge): 1=healthy, 0=unhealthy
#
# PromQL Queries:
# - Unhealthy providers: kube_customresource_provider_healthy == 0
# - Alert on specific provider: kube_customresource_provider_healthy{name="upbound-provider-aws-eks"} == 0
# - Provider health percentage: (sum(kube_customresource_provider_healthy) / count(kube_customresource_provider_healthy)) * 100
#
# Target Resource:
#   apiVersion: pkg.crossplane.io/v1
#   kind: Provider
#

apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
kind: ResourceMetricsMonitor
metadata:
  name: provider-health
  namespace: resource-state-metrics
spec:
  configuration:
    stores:
      - group: "pkg.crossplane.io"
        version: "v1"
        kind: "Provider"
        resource: "providers"
        resolver: "cel"
        families:
          - name: "provider_healthy"
            help: "Health status of Crossplane providers (1=healthy, 0=unhealthy)"
            metrics:
              - labels:
                  - name: "package"
                    value: "o.spec.package"
                  - name: "revision"
                    value: "o.status.currentRevision != null ? o.status.currentRevision : 'unknown'"
                value: "o.status.conditions.exists(c, c.type == 'Healthy' && c.status == 'True') ? 1 : 0"
          - name: "provider_installed"
            help: "Installed status of Crossplane providers (1=installed, 0=not installed)"
            metrics:
              - labels:
                  - name: "package"
                    value: "o.spec.package"
                value: "o.status.conditions.exists(c, c.type == 'Installed' && c.status == 'True') ? 1 : 0"
