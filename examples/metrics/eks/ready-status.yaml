# Example: Track XR Ready Status
# Use Case: Monitor EKS cluster provisioning - alert when XRs are not ready
# Resolver: CEL (Common Expression Language)
#
# Metrics Generated:
# - kube_customresource_eks_ready (gauge): 1=ready, 0=not ready
#
# PromQL Queries:
# - Not-ready EKS clusters: kube_customresource_eks_ready{name="configuration-aws-eks"} == 0
# - SLO percentage: (sum(kube_customresource_eks_ready == 1) / count(kube_customresource_eks_ready)) * 100
# - Alert on any not-ready XR: kube_customresource_eks_ready == 0
#
# Target XR:
#   apiVersion: aws.platform.upbound.io/v1alpha1
#   kind: EKS

apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
kind: ResourceMetricsMonitor
metadata:
  name: xr-ready-status
  namespace: resource-state-metrics
spec:
  configuration:
    stores:
      - group: "aws.platform.upbound.io"
        version: "v1alpha1"
        kind: "EKS"
        resource: "eks"
        resolver: "cel"
        families:
          - name: "eks_ready"
            help: "Ready status of Crossplane XRs (1=ready, 0=not ready)"
            metrics:
              - labels:
                  - name: "region"
                    value: "o.spec.parameters.region != null ? o.spec.parameters.region : 'unknown'"
                value: "o.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True') ? 1 : 0"
