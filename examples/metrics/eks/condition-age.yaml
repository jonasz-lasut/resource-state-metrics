# Example: Track Condition Age (Last Transition Time)
# Use Case: SLO monitoring - measure how long EKS clusters stay in each state
# Resolver: CEL (Common Expression Language)
#
# Metrics Generated:
# - kube_customresource_eks_ready_last_transition_timestamp (gauge): Unix timestamp of last transition
#
# PromQL Queries:
# - Alert if not-ready for > 5 minutes: (time() - kube_customresource_eks_ready_last_transition_timestamp{ready_status="False"}) > 300
# - Clusters transitioned to ready in last hour: (time() - kube_customresource_eks_ready_last_transition_timestamp{ready_status="True"}) < 3600
# - Average time in not-ready state: avg((time() - kube_customresource_eks_ready_last_transition_timestamp{ready_status="False"}) / 3600)
#
# Target XR:
#   apiVersion: aws.platform.upbound.io/v1alpha1
#   kind: EKS

apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
kind: ResourceMetricsMonitor
metadata:
  name: xr-condition-age
  namespace: resource-state-metrics
spec:
  configuration:
    stores:
      - group: "aws.platform.upbound.io"
        version: "v1alpha1"
        kind: "EKS"
        resource: "eks"
        resolver: "cel"
        families:
          - name: "eks_ready_last_transition_timestamp"
            help: "Unix timestamp when XR Ready condition last transitioned"
            metrics:
              - labels:
                  - name: "region"
                    value: "o.spec.parameters.region != null ? o.spec.parameters.region : 'unknown'"
                  - name: "ready_status"
                    # Include current status for filtering in queries
                    value: |
                      o.status.conditions.exists(c, c.type == 'Ready') ?
                        o.status.conditions.filter(c, c.type == 'Ready')[0].status : 'Unknown'
                # Convert RFC3339 timestamp to Unix seconds using RSM's custom unixSeconds() function
                value: |
                  o.status.conditions.exists(c, c.type == 'Ready') ?
                    unixSeconds(o.status.conditions.filter(c, c.type == 'Ready')[0].lastTransitionTime) : 0
